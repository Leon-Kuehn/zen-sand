<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen Sand</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage">
    <header>
      <h1>Zen Sand</h1>
      <p class="subtitle">Ein Sandkasten zum Runterkommen. Kein Ziel, kein Timer.</p>
      <p class="rank-line" id="rank-line"></p>
    </header>

    <div class="layout" id="layout">
      <aside class="sidebar sidebar-left" id="sidebar-left">
        <button class="sidebar-toggle" id="toggle-left" title="Ein-/Ausklappen">◀</button>
        <div class="sidebar-body">
          <h2 class="sidebar-title">Materialien</h2>
          <nav class="palette" id="palette"></nav>
          <div class="special-row" id="special-row"></div>
          <div class="special-row" id="action-tools-row"></div>
          <div class="special-row" id="weather-row"></div>
          <h2 class="sidebar-title">Karten</h2>
          <div class="special-row" id="preset-row"></div>

          <h2 class="sidebar-title">Gärten</h2>
          <div class="garden-controls">
            <button id="garden-save-btn" class="ghost-btn small" title="Aktuelle Fläche unter einem Namen speichern">💾 Garten speichern</button>
          </div>
          <div id="garden-list" class="garden-list"></div>
        </div>
      </aside>

      <main class="main-area">
        <section class="brush-row">
          <label for="brush-slider">Pinselgröße: <span id="brush-label">3</span></label>
          <input type="range" id="brush-slider" min="1" max="6" value="3" step="1" />
          <div class="seg-group" id="shape-group">
            <button class="seg-btn active" data-shape="free" title="Freihand zeichnen">✏️</button>
            <button class="seg-btn" data-shape="line" title="Linie ziehen">📏</button>
            <button class="seg-btn" data-shape="rect" title="Rechteck aufziehen">▭</button>
            <button class="seg-btn" data-shape="fill" title="Leere Fläche füllen (mit Radierer: zusammenhängende Fläche löschen)">🪣</button>
          </div>
          <button id="symmetry-btn" class="ghost-btn small" title="Spiegelt jeden Strich an der Mitte">🪞 Spiegeln</button>
          <button id="undo-btn" class="ghost-btn small" title="Strg/Cmd+Z">↩️ Rückgängig</button>
          <button id="clear-btn" class="ghost-btn small">Leeren</button>
          <button id="export-btn" class="ghost-btn small">PNG speichern</button>
          <button id="sound-toggle" class="ghost-btn small">🔊</button>
        </section>

        <div class="canvas-wrap">
          <div class="canvas-viewport" id="canvas-viewport">
            <canvas id="canvas" width="160" height="100"></canvas>
          </div>
          <div id="toast" class="toast"></div>
        </div>

        <section class="sim-row">
          <button id="pause-btn" class="ghost-btn small" title="Leertaste: Pause · Punkt-Taste: Einzelschritt">⏸️ Pause</button>
          <button id="speed-btn" class="ghost-btn small" title="Simulationstempo umschalten">▶ 1×</button>
          <button id="zoom-out-btn" class="ghost-btn small" title="Rauszoomen (auch per Mausrad)">🔍−</button>
          <button id="zoom-in-btn" class="ghost-btn small" title="Reinzoomen (auch per Mausrad)">🔍+</button>
          <button id="zoom-reset-btn" class="ghost-btn small" title="Zoom zurücksetzen · Verschieben: Alt+Ziehen oder mittlere Maustaste">↺ 100%</button>
        </section>

        <section class="time-row">
          <span id="time-label" class="time-label">☀️ Mittag</span>
          <input type="range" id="time-slider" min="0" max="100" value="50" title="Tageszeit manuell einstellen" />
          <button id="time-auto-btn" class="ghost-btn small active" disabled title="Zur automatischen Tageszeit zurückkehren">🔄 Auto</button>
        </section>

        <div class="hotbar" id="hotbar" title="Tastenkürzel 1-9, 0"></div>

        <section class="progress-row" id="progress-row">
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="progress-label" id="progress-label"></p>
        </section>
      </main>

      <aside class="sidebar sidebar-right" id="sidebar-right">
        <button class="sidebar-toggle" id="toggle-right" title="Ein-/Ausklappen">▶</button>
        <div class="sidebar-body">
          <h2 class="sidebar-title">Quests</h2>
          <div class="quest-header" id="quest-header"></div>
          <div id="challenge-list"></div>

          <details class="quest-done-group">
            <summary>📊 Lebenszeit-Statistik</summary>
            <div id="stats-body" class="stats-body"></div>
          </details>

          <button id="reset-progress-btn" class="ghost-btn small danger reset-progress-btn" title="Setzt Erfolge, Werkzeuge und Spezialmaterialien zurück – die Fläche bleibt erhalten">🔄 Fortschritt zurücksetzen</button>
        </div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal-box">
      <p class="modal-message" id="modal-message"></p>
      <input type="text" id="modal-input" class="modal-input" maxlength="40" />
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="ghost-btn small">Abbrechen</button>
        <button id="modal-ok-btn" class="ghost-btn small primary">OK</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
